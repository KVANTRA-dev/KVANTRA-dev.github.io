<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow-sigma">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-brace">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-outer">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="56" fill="#07080D"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(68,140,170,0.025)" stroke-width="0.5"/>
  </pattern>
  <rect width="512" height="512" rx="56" fill="url(#grid)"/>

  <!-- Ghost dots in corners -->
  <circle cx="60" cy="60" r="1.5" fill="#BC1F50" opacity="0.12"/>
  <circle cx="452" cy="60" r="1.2" fill="#D06AFF" opacity="0.10"/>
  <circle cx="60" cy="452" r="1.3" fill="#448CAA" opacity="0.10"/>
  <circle cx="452" cy="452" r="1.5" fill="#C4FF7B" opacity="0.08"/>

  <!-- Outer glow ring — very subtle -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="#FF00A1" stroke-width="0.5" opacity="0.06" filter="url(#glow-outer)"/>

  <!-- Left brace { -->
  <text x="128" y="260" font-family="JetBrains Mono, monospace" font-size="140" font-weight="700" fill="#FF00A1" text-anchor="middle" filter="url(#glow-brace)" opacity="0.92">{</text>

  <!-- Σ center -->
  <text x="256" y="260" font-family="JetBrains Mono, monospace" font-size="120" font-weight="700" fill="#C4FF7B" text-anchor="middle" filter="url(#glow-sigma)">Σ</text>

  <!-- Right brace } -->
  <text x="384" y="260" font-family="JetBrains Mono, monospace" font-size="140" font-weight="700" fill="#FF00A1" text-anchor="middle" filter="url(#glow-brace)" opacity="0.92">}</text>

  <!-- KVANTRA text -->
  <text x="256" y="400" font-family="Inter, system-ui, Arial" font-size="38" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="8" opacity="0.92">KVANTRA</text>

  <!-- Subtle tagline -->
  <text x="256" y="432" font-family="JetBrains Mono, monospace" font-size="9" fill="#3a4055" text-anchor="middle" letter-spacing="3">SEMANTIC KNOWLEDGE ENGINE</text>
</svg>
